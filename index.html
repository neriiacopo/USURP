<body class="grain-overlay home-body">
    <div id="root"></div>

    <!-- ════════════════════════════════════════════════════════════
         ORDINE DI CARICAMENTO (importante!)
         ════════════════════════════════════════════════════════════
         1. data/*      — costanti e dataset, nessuna dipendenza
         2. jsx/sigils  — componenti SVG riutilizzabili
         3. jsx/table   — TableScreen (usa Sigil + ACTION_DEFS)
         4. jsx/screens — Stage, AuthCard, LobbyCard (usano TableScreen
                          e dati)
         5. jsx/tweaks  — TweaksPanel + PhaseStrip (usano TWEAK_RANGES)
         6. jsx/app     — App root, monta su #root (ultima!)
         ════════════════════════════════════════════════════════════ -->

    <!-- 1. Data (dataset puri — modifica qui nomi case, corti, azioni, ecc.) -->
    <script type="text/babel" src="data/config.js"></script>
    <script type="text/babel" src="data/actions.js"></script>
    <script type="text/babel" src="data/roles.js"></script>
    <script type="text/babel" src="data/players.js"></script>
    <script type="text/babel" src="data/courts.js"></script>

    <!-- 2. SVG sigils -->
    <script type="text/babel" src="jsx/sigils.jsx"></script>

    <!-- 3. Table (motore di gioco + rendering) -->
    <script type="text/babel" src="jsx/table.jsx"></script>

    <!-- 4. Screens -->
    <script type="text/babel" src="jsx/screens/stage.jsx"></script>
    <script type="text/babel" src="jsx/screens/auth.jsx"></script>
    <script type="text/babel" src="jsx/screens/lobby.jsx"></script>

    <!-- 5. Dev panels -->
    <script type="text/babel" src="jsx/tweaks.jsx"></script>

    <!-- 6. App root + mount -->
    <script type="text/babel" src="jsx/app.jsx"></script>
</body>
</html>
