<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>USURP — Prototype</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="prototype.css">
<link rel="stylesheet" href="game.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="grain-overlay">
<div id="root"></div>

<script type="text/babel" src="proto/sigils.jsx"></script>
<script type="text/babel" src="proto/auth.jsx"></script>
<script type="text/babel" src="proto/lobby.jsx"></script>
<script type="text/babel" src="proto/table.jsx"></script>
<script type="text/babel" src="proto/game.jsx"></script>
<script type="text/babel" src="proto/states.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const SCREENS = [
  { id: "auth",   label: "AUTH"       },
  { id: "lobby",  label: "LOBBY"      },
  { id: "table",  label: "THE COURT"  },
  { id: "game",   label: "LIVE GAME"  },
  { id: "states", label: "RITES"      },
];

const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('usurp:screen') || 'auth');
  useEffect(() => { localStorage.setItem('usurp:screen', screen); }, [screen]);

  return (
    <div className="app">
      <nav className="nav" data-screen-label="nav">
        <div className="nav-left">
          <div className="nav-mark">
            <svg viewBox="-40 -40 80 80" width="34" height="34">
              <circle cx="0" cy="0" r="30" stroke="#7d8ed8" strokeWidth="0.6" fill="none" opacity="0.4"/>
              <circle cx="0" cy="0" r="22" stroke="#e1b968" strokeWidth="0.8" fill="none" opacity="0.6"/>
              <circle cx="0" cy="0" r="5" fill="#e1b968"/>
              <g stroke="#e1b968" strokeWidth="1.2" strokeLinecap="square">
                {Array.from({length: 9}).map((_, i) => {
                  const a = (i / 9) * Math.PI * 2 - Math.PI/2;
                  const x1 = Math.cos(a) * 32, y1 = Math.sin(a) * 32;
                  const x2 = Math.cos(a) * 18, y2 = Math.sin(a) * 18;
                  return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}/>;
                })}
              </g>
            </svg>
            <div>
              <div className="wm">USURP</div>
              <div className="sub">· RITE OF COWRIES ·</div>
            </div>
          </div>
        </div>
        <div className="screen-tabs">
          {SCREENS.map(s => (
            <button key={s.id} className={"screen-tab" + (screen === s.id ? " active" : "")} onClick={() => setScreen(s.id)}>
              {s.label}
            </button>
          ))}
        </div>
        <div style={{fontFamily:'var(--font-mono)', fontSize:'10px', letterSpacing:'0.22em', color:'var(--indigo-300)', textTransform:'uppercase'}}>HOUSE ADJEI · ◐ 2,304</div>
      </nav>

      <div className="screen-stage">
        <div className="screen" data-screen-label={screen}>
          {screen === "auth"   && <AuthScreen/>}
          {screen === "lobby"  && <LobbyScreen/>}
          {screen === "table"  && <TableScreen/>}
          {screen === "game"   && <GameScreen/>}
          {screen === "states" && <StatesScreen/>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
