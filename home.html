<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>USURP — The Rite of Cowries</title>
        <link
            rel="stylesheet"
            href="colors_and_type.css"
        />
        <link
            rel="stylesheet"
            href="prototype.css"
        />
        <link
            rel="stylesheet"
            href="game.css"
        />
        <link
            rel="stylesheet"
            href="home.css?v=4"
        />
        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"
        ></script>
    </head>
    <body class="grain-overlay home-body">
        <div id="root"></div>

        <script
            type="text/babel"
            src="proto/sigils.jsx"
        ></script>
        <script
            type="text/babel"
            src="proto/table.jsx"
        ></script>

        <script type="text/babel">
            const { useState, useEffect, useRef } = React;

            /* ────────────────────────────────────────────────────────────────
   STAGE — the persistent background. Starts as the "left quadrant"
   of the old AuthScreen (constellations + BigSun + hero copy) and
   later reveals the Court (TableScreen) underneath.
   ──────────────────────────────────────────────────────────────── */
            const Stage = ({ phase, dealing, turnKey, tweaks }) => {
                // On 'court' phase the hero recedes and the Court is the star.
                const heroVisible =
                    phase === "landing" ||
                    phase === "auth" ||
                    phase === "lobby";

                return (
                    <div className={"stage stage-" + phase}>
                        {/* Court lives underneath, always mounted so it can cross-fade */}
                        <div
                            className={
                                "stage-court " +
                                (phase === "court" ? "is-live" : "is-dormant")
                            }
                        >
                            <TableScreen
                                dealing={dealing}
                                dealDuration={tweaks.dealDuration}
                                dealStagger={tweaks.dealStagger}
                                turnSeconds={tweaks.turnSeconds}
                                turnKey={turnKey}
                                sunDimDepth={tweaks.sunDimDepth}
                            />
                        </div>

                        {/* Hero = the left quadrant of AuthScreen, scaled up to fill viewport */}
                        <div
                            className={
                                "stage-hero " +
                                (heroVisible ? "is-live" : "is-gone")
                            }
                            aria-hidden={!heroVisible}
                        >
                            <div className="hero-stars" />
                            <div className="hero-vignette" />
                            <div className="hero-sun-xl">
                                <BigSun size={520} />
                            </div>
                            <div className="hero-copy-xl">
                                <div className="hero-eyebrow">
                                    · BCN · USURP · THE RITE OF COWRIES ·
                                </div>
                                <h1>
                                    The Suncrown is&nbsp;vacant.
                                    <br />
                                    <em>Five Houses. Ten faces.</em>
                                </h1>
                                <div className="hero-tagline">
                                    · ONE SEAT REMAINS · FIVE WILL CONTEND ·
                                </div>
                            </div>
                        </div>

                        {/* Top nav ribbon — always present, style shifts with phase */}
                        <nav className="home-nav">
                            <div className="nav-mark">
                                <svg
                                    viewBox="-40 -40 80 80"
                                    width="34"
                                    height="34"
                                >
                                    <circle
                                        cx="0"
                                        cy="0"
                                        r="30"
                                        stroke="#7d8ed8"
                                        strokeWidth="0.6"
                                        fill="none"
                                        opacity="0.4"
                                    />
                                    <circle
                                        cx="0"
                                        cy="0"
                                        r="22"
                                        stroke="#e1b968"
                                        strokeWidth="0.8"
                                        fill="none"
                                        opacity="0.6"
                                    />
                                    <circle
                                        cx="0"
                                        cy="0"
                                        r="5"
                                        fill="#e1b968"
                                    />
                                    <g
                                        stroke="#e1b968"
                                        strokeWidth="1.2"
                                        strokeLinecap="square"
                                    >
                                        {Array.from({ length: 9 }).map(
                                            (_, i) => {
                                                const a =
                                                    (i / 9) * Math.PI * 2 -
                                                    Math.PI / 2;
                                                return (
                                                    <line
                                                        key={i}
                                                        x1={Math.cos(a) * 32}
                                                        y1={Math.sin(a) * 32}
                                                        x2={Math.cos(a) * 18}
                                                        y2={Math.sin(a) * 18}
                                                    />
                                                );
                                            },
                                        )}
                                    </g>
                                </svg>
                                <div>
                                    <div className="wm">USURP</div>
                                    <div className="sub">
                                        · RITE OF COWRIES ·
                                    </div>
                                </div>
                            </div>
                            <div className="nav-status">
                                {phase === "court" ? (
                                    <span>
                                        <span className="pulse" /> HOUSE ADJEI ·
                                        COURT LIVE · ◐ 2,304
                                    </span>
                                ) : (
                                    <span>A GAME FROM BCN · SEASON VII</span>
                                )}
                            </div>
                        </nav>
                    </div>
                );
            };

            /* ────────────────────────────────────────────────────────────────
   AUTH CARD — floats in, 1/3 viewport width
   ──────────────────────────────────────────────────────────────── */
            const AuthCard = ({ onEnter, state }) => {
                const [houseName, setHouseName] = useState("ADJEI");
                const [phrase, setPhrase] = useState("•••••••••••");
                const ref = useRef(null);

                useEffect(() => {
                    const onKey = (e) => {
                        if (state !== "in") return;
                        if (e.key === "Enter") {
                            e.preventDefault();
                            onEnter();
                        }
                    };
                    window.addEventListener("keydown", onKey);
                    return () => window.removeEventListener("keydown", onKey);
                }, [state, onEnter]);

                return (
                    <div
                        className={"floater auth-card state-" + state}
                        ref={ref}
                    >
                        <span className="bk-a"></span>
                        <span className="bk-b"></span>
                        <div className="auth-eyebrow">· THE COURT AWAITS ·</div>
                        <h2 className="auth-h2">
                            Declare your
                            <br />
                            <em>House.</em>
                        </h2>

                        <div className="fld">
                            <div className="lab">
                                <span>HOUSE NAME</span>
                                <span className="faint">3–24 CHARS</span>
                            </div>
                            <input
                                type="text"
                                value={houseName}
                                onChange={(e) =>
                                    setHouseName(e.target.value.toUpperCase())
                                }
                            />
                        </div>
                        <div className="fld">
                            <div className="lab">
                                <span>SEAL PHRASE</span>
                                <span className="faint">MEMORIZE</span>
                            </div>
                            <input
                                type="password"
                                value={phrase}
                                onChange={(e) => setPhrase(e.target.value)}
                            />
                        </div>

                        <button
                            className="btn btn-primary auth-enter"
                            onClick={onEnter}
                        >
                            ENTER THE COURT <span className="arr">↵</span>
                        </button>

                        <div className="auth-divider">
                            <div className="line" />
                            <span>OR</span>
                            <div className="line" />
                        </div>
                        <button className="btn btn-ghost auth-ghost">
                            ◐ CLAIM A COURT-CODE
                        </button>

                        <div className="auth-footnote">
                            NEW TO THE RITE? ·{" "}
                            <span className="amber">READ THE DOCTRINE</span>
                        </div>
                        <div className="auth-enter-hint">
                            PRESS ↵ ENTER TO PROCEED
                        </div>
                    </div>
                );
            };

            /* ────────────────────────────────────────────────────────────────
   LOBBY CARD — floats in, 80% viewport width
   ──────────────────────────────────────────────────────────────── */
            const LobbyCard = ({ onOpenCourt, state }) => {
                const courts = [
                    {
                        code: "USU·4K2·9",
                        name: "THE SAVANNA CUT",
                        sub: "HIGH STAKES · 5 SEATS",
                        filled: 3,
                        stake: "◐ 10 ANTE",
                        status: "OPEN",
                    },
                    {
                        code: "USU·7H1·3",
                        name: "MERIDIAN PIT",
                        sub: "STANDARD · 4 SEATS",
                        filled: 4,
                        stake: "◐ 05 ANTE",
                        status: "FULL",
                    },
                    {
                        code: "USU·2D8·0",
                        name: "THE LOW RITE",
                        sub: "NOVICE · 3 SEATS",
                        filled: 1,
                        stake: "◐ 02 ANTE",
                        status: "OPEN",
                    },
                    {
                        code: "USU·9F5·7",
                        name: "DUSK CHAMBER",
                        sub: "BLITZ · 15s · 4 SEATS",
                        filled: 2,
                        stake: "◐ 05 ANTE",
                        status: "OPEN",
                    },
                    {
                        code: "USU·1B6·4",
                        name: "THE BONE SEAT",
                        sub: "RITUAL · 6 SEATS",
                        filled: 5,
                        stake: "◐ 20 ANTE",
                        status: "OPEN",
                    },
                ];

                return (
                    <div className={"floater lobby-card state-" + state}>
                        <span className="bk-a"></span>
                        <span className="bk-b"></span>
                        <div className="lobby-grid">
                            <aside className="lobby-aside">
                                <div className="aside-eyebrow">
                                    · HOUSE ADJEI ·
                                </div>
                                <div className="aside-item active">
                                    <span className="dot" />
                                    THE COURTS
                                </div>
                                <div className="aside-item">
                                    <span className="dot" />
                                    PRIVATE CIRCLE
                                </div>
                                <div className="aside-item">
                                    <span className="dot" />
                                    CHRONICLE
                                </div>
                                <div className="aside-item">
                                    <span className="dot" />
                                    DOCTRINE
                                </div>
                                <div className="aside-item">
                                    <span className="dot" />
                                    TREASURY
                                </div>
                                <div className="aside-divider" />
                                <div className="aside-subhead">STANDING</div>
                                <div className="aside-stats">
                                    <div>
                                        <span>WINS</span>
                                        <span className="amber">142</span>
                                    </div>
                                    <div>
                                        <span>LOSSES</span>
                                        <span className="verm">088</span>
                                    </div>
                                    <div>
                                        <span>FACES CLAIMED</span>
                                        <span className="brass">417</span>
                                    </div>
                                    <div>
                                        <span>COWRIES</span>
                                        <span className="brass">◐ 2,304</span>
                                    </div>
                                </div>
                            </aside>

                            <main className="lobby-main">
                                <div className="lobby-header">
                                    <div>
                                        <div className="lobby-eyebrow">
                                            · SEVEN COURTS CONVENE ·
                                        </div>
                                        <h2>The Meridian</h2>
                                    </div>
                                    <div className="lobby-actions">
                                        <button className="btn btn-ghost">
                                            ⌕ FIND A COURT
                                        </button>
                                        <button
                                            className="btn btn-primary lobby-open"
                                            onClick={onOpenCourt}
                                        >
                                            + OPEN A COURT
                                        </button>
                                    </div>
                                </div>
                                <div className="court-list">
                                    {courts.map((c, i) => (
                                        <div
                                            key={i}
                                            className="court-row"
                                            style={
                                                c.status === "FULL"
                                                    ? { opacity: 0.55 }
                                                    : {}
                                            }
                                        >
                                            <div className="code">{c.code}</div>
                                            <div>
                                                <div className="name">
                                                    {c.name}
                                                </div>
                                                <div className="sub">
                                                    {c.sub}
                                                </div>
                                            </div>
                                            <div className="seats">
                                                {Array.from({ length: 5 }).map(
                                                    (_, j) => (
                                                        <div
                                                            key={j}
                                                            className={
                                                                "seat-dot " +
                                                                (j < c.filled
                                                                    ? "filled"
                                                                    : "")
                                                            }
                                                        />
                                                    ),
                                                )}
                                            </div>
                                            <div className="stake">
                                                {c.stake}
                                            </div>
                                            <span
                                                className="chip"
                                                style={
                                                    c.status === "FULL"
                                                        ? {
                                                              background:
                                                                  "rgba(201,61,31,0.1)",
                                                              borderColor:
                                                                  "rgba(201,61,31,0.3)",
                                                              color: "var(--verm-300)",
                                                          }
                                                        : {}
                                                }
                                            >
                                                {c.status}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </main>

                            <aside className="lobby-right">
                                <div className="right-eyebrow">
                                    · COURT SCRIBE · LAST HOUR ·
                                </div>
                                <div className="scribe-line">
                                    <span className="t">
                                        03:51 · MERIDIAN PIT
                                    </span>
                                    <span className="h">HOUSE ONWU</span> seized
                                    the Suncrown. Three unseated.
                                </div>
                                <div className="scribe-line">
                                    <span className="t">
                                        03:42 · DUSK CHAMBER
                                    </span>
                                    <span className="h">HOUSE BANDA</span>{" "}
                                    recanted — one face forfeit.
                                </div>
                                <div className="scribe-line">
                                    <span className="t">
                                        03:30 · THE BONE SEAT
                                    </span>
                                    <span className="h">HOUSE KWENA</span>{" "}
                                    declared a coup. ◐ −7.
                                </div>
                                <div className="scribe-line">
                                    <span className="t">
                                        03:14 · SAVANNA CUT
                                    </span>
                                    <span className="h">HOUSE TEMBO</span>{" "}
                                    upheld OBA. Accusation defeated.
                                </div>
                                <div className="aside-divider" />
                                <div className="right-eyebrow">· DECREES ·</div>
                                <div className="decree">
                                    <span className="amber">→</span> Season VII
                                    opens on the third moon. Ante doubled across
                                    all High Rite tables.
                                </div>
                            </aside>
                        </div>
                    </div>
                );
            };

            /* ────────────────────────────────────────────────────────────────
   APP — phase state machine + persistence
   phases: landing → auth → lobby → court
   ──────────────────────────────────────────────────────────────── */
            const PHASES = ["landing", "auth", "lobby", "court"];

            const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
                dealDuration: 1500,
                dealStagger: 55,
                turnSeconds: 20,
                sunDimDepth: 0.8,
                autoReplayTurn: true,
            }; /*EDITMODE-END*/

            const App = () => {
                const stored =
                    typeof localStorage !== "undefined"
                        ? localStorage.getItem("usurp:home:phase")
                        : null;
                const [phase, setPhase] = useState(
                    // PHASES.includes(stored) ? stored : "landing",
                    "landing",
                );
                // card states: 'hidden' | 'in' | 'out'
                const [authState, setAuthState] = useState("hidden");
                const [lobbyState, setLobbyState] = useState("hidden");

                // Tweakable config
                const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
                const setTweak = (k, v) => {
                    setTweaks((t) => ({ ...t, [k]: v }));
                    window.parent.postMessage(
                        { type: "__edit_mode_set_keys", edits: { [k]: v } },
                        "*",
                    );
                };

                // Deal animation trigger — keyed so we can replay
                const [dealing, setDealing] = useState(false);
                const [turnKey, setTurnKey] = useState(0);

                // Tweaks panel visibility (host-controlled)
                const [tweaksOpen, setTweaksOpen] = useState(false);

                useEffect(() => {
                    localStorage.setItem("usurp:home:phase", phase);
                }, [phase]);

                // Edit-mode protocol — listener FIRST, then announce.
                useEffect(() => {
                    const onMsg = (e) => {
                        if (!e.data || typeof e.data !== "object") return;
                        if (e.data.type === "__activate_edit_mode")
                            setTweaksOpen(true);
                        if (e.data.type === "__deactivate_edit_mode")
                            setTweaksOpen(false);
                    };
                    window.addEventListener("message", onMsg);
                    window.parent.postMessage(
                        { type: "__edit_mode_available" },
                        "*",
                    );
                    return () => window.removeEventListener("message", onMsg);
                }, []);

                /* Boot sequence: landing → auth floats in after a beat */
                useEffect(() => {
                    if (phase === "landing") {
                        setAuthState("hidden");
                        setLobbyState("hidden");
                        const t = setTimeout(() => setPhase("auth"), 3000);
                        return () => clearTimeout(t);
                    }
                    if (phase === "auth") {
                        setAuthState("in");
                        setLobbyState("hidden");
                    }
                    if (phase === "lobby") {
                        setAuthState("hidden");
                        setLobbyState("in");
                    }
                    if (phase === "court") {
                        setAuthState("hidden");
                        setLobbyState("hidden");
                    }
                }, [phase]);

                /* Transitions */
                const goAuthToLobby = () => {
                    setAuthState("out");
                    setTimeout(() => setPhase("lobby"), 520);
                };
                const goLobbyToCourt = () => {
                    setLobbyState("out");
                    setTimeout(() => {
                        setPhase("court");
                        // After the court has painted, trigger the deal + start turn timer.
                        setTimeout(() => {
                            setDealing(true);
                            // Clear the dealing flag after the animation completes.
                            const total =
                                tweaks.dealDuration +
                                12 * tweaks.dealStagger +
                                400;
                            setTimeout(() => {
                                setDealing(false);
                                setTurnKey((k) => k + 1); // kick off turn-timer dim
                            }, total);
                        }, 260);
                    }, 520);
                };

                // When we land on 'court' directly (e.g. refresh), still start a turn.
                useEffect(() => {
                    if (phase === "court" && !dealing) {
                        setTurnKey((k) => k + 1);
                    }
                    // eslint-disable-next-line
                }, [phase]);

                // Auto-replay turn timer so the sun dim is continuously visible.
                useEffect(() => {
                    if (phase !== "court" || !tweaks.autoReplayTurn || dealing)
                        return;
                    const t = setTimeout(
                        () => setTurnKey((k) => k + 1),
                        (tweaks.turnSeconds + 1) * 1000,
                    );
                    return () => clearTimeout(t);
                }, [
                    phase,
                    turnKey,
                    tweaks.turnSeconds,
                    tweaks.autoReplayTurn,
                    dealing,
                ]);

                const replayDeal = () => {
                    if (phase !== "court") return;
                    setDealing(false);
                    setTimeout(() => {
                        setDealing(true);
                        const total =
                            tweaks.dealDuration + 12 * tweaks.dealStagger + 400;
                        setTimeout(() => {
                            setDealing(false);
                            setTurnKey((k) => k + 1);
                        }, total);
                    }, 40);
                };

                /* Dev: keyboard reset */
                useEffect(() => {
                    const onKey = (e) => {
                        if (e.key === "Escape") {
                            setPhase("landing");
                        }
                    };
                    window.addEventListener("keydown", onKey);
                    return () => window.removeEventListener("keydown", onKey);
                }, []);

                return (
                    <div
                        className="home-app"
                        data-phase={phase}
                    >
                        <Stage
                            phase={phase}
                            dealing={dealing}
                            turnKey={turnKey}
                            tweaks={tweaks}
                        />

                        {/* Auth card is mounted whenever we're past landing and before court */}
                        {(phase === "landing" ||
                            phase === "auth" ||
                            authState === "out") && (
                            <AuthCard
                                onEnter={goAuthToLobby}
                                state={authState}
                            />
                        )}

                        {/* Lobby card mounted on lobby phase + during exit */}
                        {(phase === "lobby" || lobbyState === "out") && (
                            <LobbyCard
                                onOpenCourt={goLobbyToCourt}
                                state={lobbyState}
                            />
                        )}

                        {/* Tweaks panel */}
                        <div
                            className={
                                "tweaks-panel" + (tweaksOpen ? " open" : "")
                            }
                        >
                            <div className="tweaks-head">
                                <span>· TWEAKS ·</span>
                                <button
                                    className="close"
                                    onClick={() => {
                                        setTweaksOpen(false);
                                        window.parent.postMessage(
                                            { type: "__edit_mode_deactivate" },
                                            "*",
                                        );
                                    }}
                                >
                                    ×
                                </button>
                            </div>

                            <div className="tweaks-row">
                                <div className="lab">
                                    <span>DEAL DURATION</span>
                                    <span className="v">
                                        {tweaks.dealDuration}ms
                                    </span>
                                </div>
                                <input
                                    type="range"
                                    min="600"
                                    max="3000"
                                    step="100"
                                    value={tweaks.dealDuration}
                                    onChange={(e) =>
                                        setTweak(
                                            "dealDuration",
                                            +e.target.value,
                                        )
                                    }
                                />
                            </div>

                            <div className="tweaks-row">
                                <div className="lab">
                                    <span>DEAL STAGGER</span>
                                    <span className="v">
                                        {tweaks.dealStagger}ms
                                    </span>
                                </div>
                                <input
                                    type="range"
                                    min="30"
                                    max="220"
                                    step="5"
                                    value={tweaks.dealStagger}
                                    onChange={(e) =>
                                        setTweak("dealStagger", +e.target.value)
                                    }
                                />
                            </div>

                            <div className="tweaks-row">
                                <button
                                    className="action"
                                    onClick={replayDeal}
                                >
                                    ▶ REPLAY DEAL
                                </button>
                            </div>

                            <div className="tweaks-row">
                                <div className="lab">
                                    <span>TURN SECONDS</span>
                                    <span className="v">
                                        {tweaks.turnSeconds}s
                                    </span>
                                </div>
                                <div className="vals">
                                    {[10, 20, 30, 45, 60].map((n) => (
                                        <button
                                            key={n}
                                            className={
                                                tweaks.turnSeconds === n
                                                    ? "active"
                                                    : ""
                                            }
                                            onClick={() => {
                                                setTweak("turnSeconds", n);
                                                setTurnKey((k) => k + 1);
                                            }}
                                        >
                                            {n}s
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="tweaks-row">
                                <div className="lab">
                                    <span>SUN DIM DEPTH</span>
                                    <span className="v">
                                        {Math.round(tweaks.sunDimDepth * 100)}%
                                    </span>
                                </div>
                                <input
                                    type="range"
                                    min="0.2"
                                    max="0.95"
                                    step="0.05"
                                    value={tweaks.sunDimDepth}
                                    onChange={(e) =>
                                        setTweak("sunDimDepth", +e.target.value)
                                    }
                                />
                            </div>

                            <div className="tweaks-row">
                                <button
                                    className="action"
                                    onClick={() => setTurnKey((k) => k + 1)}
                                >
                                    ↺ RESTART TURN
                                </button>
                            </div>

                            <div className="tweaks-row">
                                <div className="lab">
                                    <span>AUTO-REPLAY TURN</span>
                                </div>
                                <div className="vals">
                                    <button
                                        className={
                                            tweaks.autoReplayTurn
                                                ? "active"
                                                : ""
                                        }
                                        onClick={() =>
                                            setTweak("autoReplayTurn", true)
                                        }
                                    >
                                        ON
                                    </button>
                                    <button
                                        className={
                                            !tweaks.autoReplayTurn
                                                ? "active"
                                                : ""
                                        }
                                        onClick={() =>
                                            setTweak("autoReplayTurn", false)
                                        }
                                    >
                                        OFF
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Dev strip — lets the reviewer jump between phases */}
                        <div className="phase-strip">
                            {PHASES.map((p) => (
                                <button
                                    key={p}
                                    className={
                                        "ps-btn " +
                                        (phase === p ? "active" : "")
                                    }
                                    onClick={() => setPhase(p)}
                                >
                                    {p.toUpperCase()}
                                </button>
                            ))}
                            <span className="ps-hint">ESC · RESET</span>
                        </div>
                    </div>
                );
            };

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
